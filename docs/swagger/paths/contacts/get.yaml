tags:
  - Contacts
summary: Get list of contacts
operationId: getContacts
description: Get list of contacts with this endpoint
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    required: true
    schema:
      type: integer
      minimum: 1
      example: 1
  - name: perPage
    in: query
    required: true
    schema:
      type: integer
      minimum: 1
      example: 10
  - name: sortBy
    in: query
    schema:
      type: string
      description: All contact's fields can be mentioned. Default value - _id
      example: name
  - name: sortOrder
    in: query
    schema:
      type: string
      enum: [asc, desc]
      example: asc
  - name: isFavourite
    in: query
    schema:
      type: boolean
      example: false
  - name: contactType
    in: query
    schema:
      type: string
      enum: [work, home, personal]
      example: personal
responses:
  '200':
    description: Successful operation
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              required:
                - data
                - page
                - perPage
                - totalItems
                - totalPages
                - hasNextPage
                - hasPreviousPage
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/contact.yaml'
                page:
                  type: number
                  example: 2
                perPage:
                  type: number
                  example: 4
                totalItems:
                  type: number
                  example: 4
                totalPages:
                  type: number
                  example: 4
                hasNextPage:
                  type: boolean
                  example: false
                hasPreviousPage:
                  type: boolean
                  example: true
  '400':
    $ref: '../../components/responses/400.yaml'
  '401':
    $ref: '../../components/responses/401.yaml'
  '500':
    $ref: '../../components/responses/500.yaml'
