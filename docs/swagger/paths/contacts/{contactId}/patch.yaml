tags:
  - Contacts
summary: Update contact
operationId: updateContact
description: Update contact by contact ID
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
      example: 67e2bf307fd94c433a4cff2e
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            description: Contact's name
            example: Eduard Test
          phoneNumber:
            type: string
            description: Contact's phone number
            example: +380661234567
          email:
            type: string
            description: Contact's email
            example: example@gmail.com
          isFavourite:
            type: boolean
            description: Whether the contact is a favourite
            default: false
          contactType:
            type: string
            description: Contact's type
            enum: [work, home, personal]
            default: personal
          photo:
            type: string
            format: binary
            description: Link to contact's photo
            example: 'https://res.cloudinary.com/ddwu8tu5p/image/upload/v1742980217/contacts/ut5w1aohncq2bhvyluoy.jpg'
responses:
  '200':
    description: Successful operation
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated a contact!
            data:
              type: object
              $ref: '../../../components/schemas/contact.yaml'
  '400':
    $ref: '../../../components/responses/400.yaml'
  '401':
    $ref: '../../../components/responses/401.yaml'
  '404':
    $ref: '../../../components/responses/404.yaml'
    description: Contact not found
  '500':
    $ref: '../../../components/responses/500.yaml'
