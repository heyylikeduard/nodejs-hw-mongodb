tags:
  - Auth
summary: User login
operationId: loginUser
description: Login with provided credentials
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
          - password
        properties:
          email:
            type: string
            example: example@example.com
          password:
            type: string
            example: password123
responses:
  '200':
    description: Successful operation
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully logged in an user!
            data:
              type: object
              required:
                - accessToken
              properties:
                accessToken:
                  type: string
                  example: yGm4sPz6JhL9FwTkQ8xR0Vm1ZlV3+zK7gUt2q5nA
  '400':
    $ref: '../../components/responses/400.yaml'
  '401':
    $ref: '../../components/responses/401.yaml'
  '404':
    $ref: '../../components/responses/404.yaml'
    description: 'User not found'
  '500':
    $ref: '../../components/responses/500.yaml'
